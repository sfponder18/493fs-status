<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>493 FS Status Board</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #f5f4f1;
      color: #2c2416;
      min-height: 100vh;
    }

    code, .mono { font-family: 'JetBrains Mono', monospace; }

    /* Password Gate */
    #gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 1.5rem;
    }

    #gate h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #gate form {
      display: flex;
      gap: 0.5rem;
    }

    #gate input[type="password"] {
      padding: 0.6rem 1rem;
      border: 2px solid #2c2416;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      background: #fff;
      outline: none;
    }

    #gate input[type="password"]:focus {
      border-color: #b8922e;
    }

    #gate button {
      padding: 0.6rem 1.2rem;
      background: #2c2416;
      color: #f5f4f1;
      border: none;
      border-radius: 6px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }

    #gate button:hover { background: #b8922e; }

    #gate .error {
      color: #c0392b;
      font-size: 0.85rem;
      font-weight: 500;
      min-height: 1.2em;
    }

    /* Dashboard */
    #dashboard { display: none; padding: 2rem; max-width: 960px; margin: 0 auto; }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    header .squadron {
      font-size: 0.85rem;
      color: #7a7060;
      font-weight: 500;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat {
      background: #fff;
      border: 1px solid #e0ddd6;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }

    .stat .num {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7a7060;
      font-weight: 600;
    }

    /* Filters + actions row */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filters button {
      padding: 0.4rem 0.9rem;
      border: 1.5px solid #2c2416;
      border-radius: 20px;
      background: transparent;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      color: #2c2416;
    }

    .filters button.active,
    .filters button:hover {
      background: #2c2416;
      color: #f5f4f1;
    }

    .btn {
      padding: 0.45rem 1rem;
      border: none;
      border-radius: 6px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: #b8922e;
      color: #fff;
    }

    .btn-primary:hover { background: #a07e24; }

    .btn-sm {
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #2c2416;
      color: #2c2416;
    }

    .btn-outline:hover { background: #2c2416; color: #f5f4f1; }

    .btn-danger {
      background: transparent;
      border: 1.5px solid #c0392b;
      color: #c0392b;
    }

    .btn-danger:hover { background: #c0392b; color: #fff; }

    /* Project Cards */
    .projects { display: flex; flex-direction: column; gap: 1rem; }

    .project {
      background: #fff;
      border: 1px solid #e0ddd6;
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
    }

    .project-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }

    .project-name {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .project-actions {
      margin-left: auto;
      display: flex;
      gap: 0.4rem;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge.status-not-started { background: #e0ddd6; color: #2c2416; }
    .badge.status-planning { background: #d6e4f0; color: #1a3a5c; }
    .badge.status-in-progress { background: #fef3cd; color: #856404; }
    .badge.status-complete { background: #d4edda; color: #155724; }
    .badge.status-on-hold { background: #f8d7da; color: #721c24; }

    .badge.priority-high { background: #c0392b; color: #fff; }
    .badge.priority-medium { background: #b8922e; color: #fff; }
    .badge.priority-low { background: #7a7060; color: #fff; }

    .project-details {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.3rem 0.8rem;
      font-size: 0.88rem;
    }

    .project-details dt {
      font-weight: 600;
      color: #7a7060;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      padding-top: 0.15rem;
    }

    .project-details dd { line-height: 1.45; }

    .overdue { color: #c0392b; font-weight: 600; }
    .deadline-soon { color: #b8922e; font-weight: 600; }

    .file-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .file-links a {
      font-size: 0.82rem;
      color: #b8922e;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid transparent;
    }

    .file-links a:hover { border-bottom-color: #b8922e; }

    .project { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .project:hover { border-color: #b8922e; box-shadow: 0 2px 8px rgba(184,146,46,0.12); }

    .empty-state {
      text-align: center;
      color: #7a7060;
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }

    .updated-at {
      text-align: right;
      font-size: 0.75rem;
      color: #999;
      margin-top: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Project Detail View */
    #detail-view { display: none; padding: 2rem; max-width: 960px; margin: 0 auto; }
    #detail-view.open { display: block; }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #7a7060;
      cursor: pointer;
      border: none;
      background: none;
      font-family: 'IBM Plex Sans', sans-serif;
      margin-bottom: 1.5rem;
      padding: 0;
    }
    .detail-back:hover { color: #2c2416; }

    .detail-card {
      background: #fff;
      border: 1px solid #e0ddd6;
      border-radius: 12px;
      padding: 2rem;
    }

    .detail-title-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .detail-title {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .detail-actions {
      margin-left: auto;
      display: flex;
      gap: 0.5rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 600px) {
      .detail-grid { grid-template-columns: 1fr; }
    }

    .detail-field {
      background: #f5f4f1;
      border-radius: 8px;
      padding: 0.9rem 1rem;
    }

    .detail-field.full-width {
      grid-column: 1 / -1;
    }

    .detail-field-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7a7060;
      margin-bottom: 0.3rem;
    }

    .detail-field-value {
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .detail-field-value.empty {
      color: #b0a898;
      font-style: italic;
    }

    .detail-updated {
      font-size: 0.75rem;
      color: #999;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 1.2rem;
      text-align: right;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 1.8rem;
      width: 90%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .modal h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .form-group {
      margin-bottom: 0.8rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7a7060;
      margin-bottom: 0.25rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1.5px solid #e0ddd6;
      border-radius: 6px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.88rem;
      background: #f5f4f1;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #b8922e;
    }

    .form-group textarea { resize: vertical; min-height: 60px; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1.2rem;
    }

    .saving-indicator {
      font-size: 0.8rem;
      color: #7a7060;
      margin-right: auto;
      align-self: center;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #2c2416;
      color: #f5f4f1;
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Password Gate -->
  <div id="gate">
    <h1>493 FS Status Board</h1>
    <form id="login-form">
      <input type="password" id="pw" placeholder="Password" autocomplete="off" autofocus>
      <button type="submit">Enter</button>
    </form>
    <div class="error" id="gate-error"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <header>
      <h1>493 FS Status Board</h1>
      <span class="squadron" id="squadron-label"></span>
    </header>

    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <div class="filters" id="filters">
        <button class="active" data-filter="active">Active</button>
        <button data-filter="all">All</button>
        <button data-filter="on hold">On Hold</button>
        <button data-filter="complete">Done</button>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Project</button>
    </div>
    <div class="projects" id="projects"></div>
    <div class="updated-at" id="updated-at"></div>
  </div>

  <!-- Project Detail View -->
  <div id="detail-view">
    <button class="detail-back" onclick="closeDetail()">&larr; Back to Board</button>
    <div id="detail-content"></div>
  </div>

  <!-- Project Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Add Project</h2>
      <form id="project-form">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="f-name" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="f-category" placeholder="e.g. Facilities, Training, Ops">
        </div>
        <div style="display:flex;gap:0.8rem">
          <div class="form-group" style="flex:1">
            <label>Status</label>
            <select id="f-status">
              <option value="not started">Not Started</option>
              <option value="planning">Planning</option>
              <option value="in progress">In Progress</option>
              <option value="complete">Complete</option>
              <option value="on hold">On Hold</option>
            </select>
          </div>
          <div class="form-group" style="flex:1">
            <label>Priority</label>
            <select id="f-priority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Milestone</label>
          <textarea id="f-milestone" placeholder="Current status and what's next"></textarea>
        </div>
        <div style="display:flex;gap:0.8rem">
          <div class="form-group" style="flex:1">
            <label>Due Date</label>
            <input type="date" id="f-due">
          </div>
          <div class="form-group" style="flex:1">
            <label>Funding</label>
            <input type="text" id="f-funding" placeholder="e.g. $200 Booster Club">
          </div>
        </div>
        <div class="form-group">
          <label>Blockers</label>
          <textarea id="f-blockers" placeholder="Any blockers or risks"></textarea>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="f-notes" placeholder="Additional context"></textarea>
        </div>
        <div class="modal-actions">
          <span class="saving-indicator" id="saving-indicator"></span>
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modal-submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Token Modal -->
  <div class="modal-overlay" id="token-overlay">
    <div class="modal">
      <h2>GitHub Token</h2>
      <p style="font-size:0.85rem;color:#7a7060;margin-bottom:1rem">
        Enter a GitHub personal access token with <strong>Contents: Read and write</strong> permission on this repo. It's stored in your browser session only.
      </p>
      <div class="form-group">
        <label>Token</label>
        <input type="password" id="f-token" placeholder="ghp_... or github_pat_...">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeTokenModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveToken()">Save Token</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

<script>
  // --- Config ---
  const PASSWORD_HASH = "d7985a2b68ea9679c5c63693c898386e05dce64510c9c00571aec55024dfe3a6";
  const DATA_URL = "./projects.json";
  const REFRESH_INTERVAL = 60000;
  const REPO_OWNER = "sfponder18";
  const REPO_NAME = "493fs-status";
  const FILE_PATH = "projects.json";

  // --- State ---
  let currentFilter = "active";
  let projectData = null;
  let editingIndex = -1; // -1 = adding new
  let pendingAction = null;

  // --- Auth ---
  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, "0")).join("");
  }

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const pw = document.getElementById("pw").value;
    const hash = await sha256(pw);
    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem("authed", "1");
      showDashboard();
    } else {
      document.getElementById("gate-error").textContent = "Incorrect password.";
    }
  });

  if (sessionStorage.getItem("authed") === "1") {
    showDashboard();
  }

  function showDashboard() {
    document.getElementById("gate").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
    if (REFRESH_INTERVAL > 0) setInterval(loadData, REFRESH_INTERVAL);
  }

  // --- Data ---
  async function loadData() {
    try {
      const res = await fetch(DATA_URL + "?t=" + Date.now());
      projectData = await res.json();
      render();
    } catch (err) {
      console.error("Failed to load project data:", err);
    }
  }

  // --- GitHub API ---
  function getToken() {
    return sessionStorage.getItem("gh_token");
  }

  function requireToken(callback) {
    if (getToken()) { callback(); return; }
    pendingAction = callback;
    document.getElementById("token-overlay").classList.add("open");
  }

  function saveToken() {
    const token = document.getElementById("f-token").value.trim();
    if (!token) return;
    sessionStorage.setItem("gh_token", token);
    closeTokenModal();
    if (pendingAction) { pendingAction(); pendingAction = null; }
  }

  function closeTokenModal() {
    document.getElementById("token-overlay").classList.remove("open");
    document.getElementById("f-token").value = "";
  }

  async function commitProjects(message) {
    const token = getToken();
    if (!token) return;

    // Get current file SHA
    const metaRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
      headers: { "Authorization": "token " + token }
    });
    if (!metaRes.ok) throw new Error("Failed to read repo file. Check your token permissions.");
    const meta = await metaRes.json();

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(projectData, null, 2) + "\n")));

    const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
      method: "PUT",
      headers: {
        "Authorization": "token " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: message,
        content: content,
        sha: meta.sha
      })
    });

    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || "Failed to save");
    }
  }

  // --- Modal ---
  function openAddModal() {
    editingIndex = -1;
    document.getElementById("modal-title").textContent = "Add Project";
    document.getElementById("modal-submit").textContent = "Add";
    clearForm();
    document.getElementById("modal-overlay").classList.add("open");
  }

  function openEditModal(idx) {
    editingIndex = idx;
    const p = projectData.projects[idx];
    document.getElementById("modal-title").textContent = "Edit Project";
    document.getElementById("modal-submit").textContent = "Save";
    document.getElementById("f-name").value = p.name || "";
    document.getElementById("f-category").value = p.category || "";
    document.getElementById("f-status").value = p.status || "not started";
    document.getElementById("f-priority").value = p.priority || "medium";
    document.getElementById("f-milestone").value = p.milestone || "";
    document.getElementById("f-due").value = p.dueDate || "";
    document.getElementById("f-funding").value = p.funding || "";
    document.getElementById("f-blockers").value = p.blockers || "";
    document.getElementById("f-notes").value = p.notes || "";
    document.getElementById("modal-overlay").classList.add("open");
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    document.getElementById("saving-indicator").textContent = "";
    clearForm();
  }

  function clearForm() {
    document.getElementById("f-name").value = "";
    document.getElementById("f-category").value = "";
    document.getElementById("f-status").value = "not started";
    document.getElementById("f-priority").value = "medium";
    document.getElementById("f-milestone").value = "";
    document.getElementById("f-due").value = "";
    document.getElementById("f-funding").value = "";
    document.getElementById("f-blockers").value = "";
    document.getElementById("f-notes").value = "";
  }

  function getFormData() {
    const p = {
      name: document.getElementById("f-name").value.trim(),
      status: document.getElementById("f-status").value,
      priority: document.getElementById("f-priority").value,
      updated: new Date().toISOString()
    };
    const cat = document.getElementById("f-category").value.trim();
    const ms = document.getElementById("f-milestone").value.trim();
    const due = document.getElementById("f-due").value;
    const fund = document.getElementById("f-funding").value.trim();
    const blk = document.getElementById("f-blockers").value.trim();
    const notes = document.getElementById("f-notes").value.trim();
    if (cat) p.category = cat;
    if (ms) p.milestone = ms;
    if (due) p.dueDate = due;
    if (fund) p.funding = fund;
    if (blk) p.blockers = blk;
    if (notes) p.notes = notes;
    return p;
  }

  document.getElementById("project-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const data = getFormData();
    if (!data.name) return;

    requireToken(async () => {
      const indicator = document.getElementById("saving-indicator");
      indicator.textContent = "Saving...";
      try {
        if (editingIndex >= 0) {
          // Preserve files array from existing project
          const existing = projectData.projects[editingIndex];
          if (existing.files) data.files = existing.files;
          projectData.projects[editingIndex] = data;
        } else {
          projectData.projects.push(data);
        }
        projectData.updated = new Date().toISOString();

        const action = editingIndex >= 0 ? "Update" : "Add";
        await commitProjects(`${action} project: ${data.name}`);
        closeModal();
        render();
        toast(`Project ${editingIndex >= 0 ? "updated" : "added"}`);
      } catch (err) {
        indicator.textContent = "Error: " + err.message;
        // Reload to revert local changes
        await loadData();
      }
    });
  });

  async function deleteProject(idx) {
    const name = projectData.projects[idx].name;
    if (!confirm(`Delete "${name}"?`)) return;

    requireToken(async () => {
      try {
        projectData.projects.splice(idx, 1);
        projectData.updated = new Date().toISOString();
        await commitProjects(`Remove project: ${name}`);
        render();
        toast("Project deleted");
      } catch (err) {
        toast("Error: " + err.message);
        await loadData();
      }
    });
  }

  // --- Toast ---
  function toast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2500);
  }

  // --- Render ---
  function render() {
    if (!projectData) return;

    document.getElementById("squadron-label").textContent = projectData.squadron || "";

    const projects = projectData.projects || [];

    const total = projects.length;
    const active = projects.filter(p => ["not started", "planning", "in progress"].includes(p.status)).length;
    const hold = projects.filter(p => p.status === "on hold").length;
    const done = projects.filter(p => p.status === "complete").length;

    document.getElementById("stats").innerHTML = `
      <div class="stat"><span class="num">${total}</span><span class="label">Total</span></div>
      <div class="stat"><span class="num">${active}</span><span class="label">Active</span></div>
      <div class="stat"><span class="num">${hold}</span><span class="label">Hold</span></div>
      <div class="stat"><span class="num">${done}</span><span class="label">Done</span></div>
    `;

    let filtered;
    if (currentFilter === "all") filtered = projects.map((p, i) => ({ ...p, _idx: i }));
    else if (currentFilter === "active") filtered = projects.map((p, i) => ({ ...p, _idx: i })).filter(p => ["not started", "planning", "in progress"].includes(p.status));
    else if (currentFilter === "on hold") filtered = projects.map((p, i) => ({ ...p, _idx: i })).filter(p => p.status === "on hold");
    else if (currentFilter === "complete") filtered = projects.map((p, i) => ({ ...p, _idx: i })).filter(p => p.status === "complete");
    else filtered = projects.map((p, i) => ({ ...p, _idx: i }));

    const prioOrder = { high: 0, medium: 1, low: 2 };
    filtered.sort((a, b) => (prioOrder[a.priority] ?? 9) - (prioOrder[b.priority] ?? 9));

    const container = document.getElementById("projects");
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state">No projects to display.</div>';
    } else {
      container.innerHTML = filtered.map(renderProject).join("");
    }

    const ts = projectData.updated ? new Date(projectData.updated).toLocaleString() : "";
    document.getElementById("updated-at").textContent = ts ? "Data updated: " + ts : "";
  }

  function renderProject(p) {
    const statusClass = "status-" + (p.status || "").replace(/\s+/g, "-");
    const prioClass = "priority-" + (p.priority || "low");
    const idx = p._idx;

    let dueDateHtml = "";
    if (p.dueDate) {
      const due = new Date(p.dueDate);
      const now = new Date();
      const daysLeft = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
      let cls = "";
      let suffix = "";
      if (p.status !== "complete") {
        if (daysLeft < 0) { cls = "overdue"; suffix = " (OVERDUE)"; }
        else if (daysLeft <= 7) { cls = "deadline-soon"; suffix = ` (${daysLeft}d left)`; }
      }
      dueDateHtml = `<dt>Due</dt><dd class="${cls}">${p.dueDate}${suffix}</dd>`;
    }

    const filesHtml = (p.files && p.files.length > 0)
      ? `<dt>Files</dt><dd class="file-links">${p.files.map(f => `<a href="${escHtml(f.url)}" target="_blank" rel="noopener">${escHtml(f.label)}</a>`).join(" ")}</dd>`
      : "";

    return `
      <div class="project" onclick="openDetail(${idx})">
        <div class="project-header">
          <span class="project-name">${escHtml(p.name)}</span>
          <span class="badge ${statusClass}">${escHtml(p.status)}</span>
          <span class="badge ${prioClass}">${escHtml(p.priority)}</span>
          ${p.category ? `<span class="badge" style="background:#e0ddd6;color:#2c2416">${escHtml(p.category)}</span>` : ""}
          <span class="project-actions">
            <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openEditModal(${idx})">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteProject(${idx})">Del</button>
          </span>
        </div>
        <dl class="project-details">
          ${p.milestone ? `<dt>Milestone</dt><dd>${escHtml(p.milestone)}</dd>` : ""}
          ${dueDateHtml}
          ${p.funding ? `<dt>Funding</dt><dd>${escHtml(p.funding)}</dd>` : ""}
          ${p.blockers ? `<dt>Blockers</dt><dd>${escHtml(p.blockers)}</dd>` : ""}
          ${p.notes ? `<dt>Notes</dt><dd>${escHtml(p.notes)}</dd>` : ""}
          ${filesHtml}
        </dl>
      </div>
    `;
  }

  function escHtml(str) {
    if (!str) return "";
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // --- Detail View ---
  function openDetail(idx) {
    const p = projectData.projects[idx];
    if (!p) return;

    document.getElementById("dashboard").style.display = "none";
    const view = document.getElementById("detail-view");
    view.style.display = "block";

    const statusClass = "status-" + (p.status || "").replace(/\s+/g, "-");
    const prioClass = "priority-" + (p.priority || "low");

    let dueDateHtml = "";
    if (p.dueDate) {
      const due = new Date(p.dueDate);
      const now = new Date();
      const daysLeft = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
      let cls = "";
      let suffix = "";
      if (p.status !== "complete") {
        if (daysLeft < 0) { cls = "overdue"; suffix = " (OVERDUE)"; }
        else if (daysLeft <= 7) { cls = "deadline-soon"; suffix = ` (${daysLeft}d left)`; }
      }
      dueDateHtml = `<span class="${cls}">${escHtml(p.dueDate)}${suffix}</span>`;
    }

    const filesHtml = (p.files && p.files.length > 0)
      ? p.files.map(f => `<a href="${escHtml(f.url)}" target="_blank" rel="noopener" style="color:#b8922e;font-weight:600;text-decoration:none">${escHtml(f.label)}</a>`).join(", ")
      : "";

    const field = (label, value, fullWidth) => {
      const cls = fullWidth ? "detail-field full-width" : "detail-field";
      const val = value
        ? `<div class="detail-field-value">${value}</div>`
        : `<div class="detail-field-value empty">Not set</div>`;
      return `<div class="${cls}"><div class="detail-field-label">${label}</div>${val}</div>`;
    };

    const updatedStr = p.updated ? new Date(p.updated).toLocaleString() : "Unknown";

    document.getElementById("detail-content").innerHTML = `
      <div class="detail-card">
        <div class="detail-title-row">
          <span class="detail-title">${escHtml(p.name)}</span>
          <span class="badge ${statusClass}">${escHtml(p.status)}</span>
          <span class="badge ${prioClass}">${escHtml(p.priority)}</span>
          ${p.category ? `<span class="badge" style="background:#e0ddd6;color:#2c2416">${escHtml(p.category)}</span>` : ""}
          <span class="detail-actions">
            <button class="btn btn-sm btn-outline" onclick="closeDetail();openEditModal(${idx})">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteProject(${idx});closeDetail();">Del</button>
          </span>
        </div>
        <div class="detail-grid">
          ${field("Milestone", p.milestone ? escHtml(p.milestone) : "", true)}
          ${field("Due Date", dueDateHtml)}
          ${field("Funding", p.funding ? escHtml(p.funding) : "")}
          ${field("Blockers", p.blockers ? escHtml(p.blockers) : "", true)}
          ${field("Notes", p.notes ? escHtml(p.notes) : "", true)}
          ${filesHtml ? field("Files", filesHtml, true) : ""}
        </div>
        <div class="detail-updated">Last updated: ${updatedStr}</div>
      </div>
    `;
  }

  function closeDetail() {
    document.getElementById("detail-view").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }

  // --- Filter buttons ---
  document.getElementById("filters").addEventListener("click", (e) => {
    if (e.target.tagName !== "BUTTON") return;
    currentFilter = e.target.dataset.filter;
    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    render();
  });
</script>

</body>
</html>
